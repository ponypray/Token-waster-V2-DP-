<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-label="Token Waster v3 hero banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1f0808"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff2400"/>
      <stop offset="50%" stop-color="#ff7700"/>
      <stop offset="100%" stop-color="#ffdd00"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffaa44"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4400"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff7700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff7700" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>

  <!-- Central glow halo behind badge -->
  <ellipse cx="640" cy="220" rx="380" ry="120" fill="url(#glow)"/>

  <!-- Left flames -->
  <g opacity="0.9">
    <path d="M 30,360 C 20,260 70,210 50,130 C 90,190 120,240 100,360 Z" fill="url(#flame)"/>
    <path d="M 110,360 C 130,300 90,250 110,200 C 140,250 160,300 150,360 Z" fill="url(#flame)" opacity="0.6"/>
    <path d="M 170,360 C 180,310 160,270 180,240 C 200,270 210,310 200,360 Z" fill="url(#flame)" opacity="0.4"/>
  </g>

  <!-- Right flames -->
  <g opacity="0.9">
    <path d="M 1250,360 C 1240,260 1290,210 1270,130 C 1310,190 1340,240 1320,360 Z" fill="url(#flame)"/>
    <path d="M 1170,360 C 1190,300 1150,250 1170,200 C 1200,250 1220,300 1210,360 Z" fill="url(#flame)" opacity="0.6"/>
    <path d="M 1110,360 C 1120,310 1100,270 1120,240 C 1140,270 1150,310 1140,360 Z" fill="url(#flame)" opacity="0.4"/>
  </g>

  <!-- Falling token sparkles -->
  <g>
    <rect x="220" y="50" width="14" height="14" fill="#ff7700" opacity="0.85"/>
    <rect x="300" y="100" width="10" height="10" fill="#ffaa00" opacity="0.75"/>
    <rect x="380" y="60" width="8" height="8" fill="#ff5500" opacity="0.85"/>
    <rect x="450" y="120" width="12" height="12" fill="#ffcc00" opacity="0.7"/>
    <rect x="240" y="200" width="6" height="6" fill="#ffaa44" opacity="0.7"/>
    <rect x="350" y="220" width="8" height="8" fill="#ff7700" opacity="0.6"/>

    <rect x="850" y="50" width="10" height="10" fill="#ff7700" opacity="0.85"/>
    <rect x="930" y="100" width="14" height="14" fill="#ffaa00" opacity="0.75"/>
    <rect x="1010" y="60" width="8" height="8" fill="#ff5500" opacity="0.85"/>
    <rect x="1080" y="120" width="12" height="12" fill="#ffcc00" opacity="0.7"/>
    <rect x="900" y="200" width="6" height="6" fill="#ffaa44" opacity="0.7"/>
    <rect x="1020" y="220" width="8" height="8" fill="#ff7700" opacity="0.6"/>
  </g>

  <!-- Main title -->
  <text x="640" y="135" text-anchor="middle"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="110" font-weight="900"
        fill="url(#title)" letter-spacing="-3">TOKEN WASTER</text>

  <!-- V3 badge -->
  <g transform="translate(640, 175)">
    <rect x="-95" y="0" width="190" height="80" rx="14" fill="url(#badge)" stroke="#ffdd00" stroke-width="2"/>
    <text x="0" y="60" text-anchor="middle"
          font-family="Impact, 'Arial Black', sans-serif"
          font-size="62" font-weight="900" fill="#0a0a0f">v3</text>
  </g>

  <!-- Tagline -->
  <text x="640" y="295" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="20" fill="#ffaa44" letter-spacing="2"
        font-weight="bold">FILL the 16384-token cap  ·  /WM = 160x  ·  Truncation = Success</text>

  <!-- Divider line -->
  <line x1="200" y1="320" x2="1080" y2="320" stroke="#ff7700" stroke-width="1" opacity="0.4"/>
  <text x="640" y="345" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="13" fill="#888" letter-spacing="4">BURN  EVERY  TOKEN</text>
</svg>