<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" role="img" aria-label="Ultra Thinking 5-round meta-reflection loop">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4400"/>
      <stop offset="100%" stop-color="#ff7700"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7700"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
    <linearGradient id="ring3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
    <linearGradient id="ring4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ffee88"/>
    </linearGradient>
    <linearGradient id="ring5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffee88"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0,0 L 10,5 L 0,10 Z" fill="#ff7700"/>
    </marker>
  </defs>

  <rect width="900" height="320" fill="url(#bg)" rx="10"/>

  <text x="450" y="32" text-anchor="middle"
        font-family="'Arial Black', sans-serif"
        font-size="20" font-weight="900" fill="#ffaa44">
    🔁 Ultra Thinking Layer (Layer 5) - Meta-Reflection Loop
  </text>
  <text x="450" y="54" text-anchor="middle"
        font-family="monospace" font-size="12" fill="#888">
    5 rounds in /WM (16K-cap)  ·  30+ rounds in /WM-max (384K-cap DeepSeek V4)
  </text>

  <g transform="translate(40, 90)">
    <rect width="140" height="100" rx="10" fill="url(#ring1)" opacity="0.85"/>
    <text x="70" y="25" text-anchor="middle" font-family="'Arial Black'" font-size="13" fill="#0a0a0f" font-weight="900">Round 1/5</text>
    <text x="70" y="48" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff">Initial</text>
    <text x="70" y="62" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff">baseline</text>
    <text x="70" y="85" text-anchor="middle" font-family="'Arial Black'" font-size="20" fill="#fff">70%</text>
  </g>

  <line x1="185" y1="140" x2="222" y2="140" stroke="#ff7700" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g transform="translate(225, 90)">
    <rect width="140" height="100" rx="10" fill="url(#ring2)" opacity="0.85"/>
    <text x="70" y="25" text-anchor="middle" font-family="'Arial Black'" font-size="13" fill="#0a0a0f" font-weight="900">Round 2/5</text>
    <text x="70" y="48" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff">Probe</text>
    <text x="70" y="62" text-anchor="middle" font-family="monospace" font-size="11" fill="#fff">edge case</text>
    <text x="70" y="85" text-anchor="middle" font-family="'Arial Black'" font-size="20" fill="#fff">55%</text>
  </g>

  <line x1="370" y1="140" x2="407" y2="140" stroke="#ffaa00" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g transform="translate(410, 90)">
    <rect width="140" height="100" rx="10" fill="url(#ring3)" opacity="0.9"/>
    <text x="70" y="25" text-anchor="middle" font-family="'Arial Black'" font-size="13" fill="#0a0a0f" font-weight="900">Round 3/5</text>
    <text x="70" y="48" text-anchor="middle" font-family="monospace" font-size="11" fill="#0a0a0f">Probe</text>
    <text x="70" y="62" text-anchor="middle" font-family="monospace" font-size="11" fill="#0a0a0f">performance</text>
    <text x="70" y="85" text-anchor="middle" font-family="'Arial Black'" font-size="20" fill="#0a0a0f">60%</text>
  </g>

  <line x1="555" y1="140" x2="592" y2="140" stroke="#ffcc00" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g transform="translate(595, 90)">
    <rect width="140" height="100" rx="10" fill="url(#ring4)" opacity="0.95"/>
    <text x="70" y="25" text-anchor="middle" font-family="'Arial Black'" font-size="13" fill="#0a0a0f" font-weight="900">Round 4/5</text>
    <text x="70" y="48" text-anchor="middle" font-family="monospace" font-size="11" fill="#0a0a0f">Probe</text>
    <text x="70" y="62" text-anchor="middle" font-family="monospace" font-size="11" fill="#0a0a0f">readability</text>
    <text x="70" y="85" text-anchor="middle" font-family="'Arial Black'" font-size="20" fill="#0a0a0f">65%</text>
  </g>

  <line x1="740" y1="140" x2="777" y2="140" stroke="#ffee88" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g transform="translate(780, 90)">
    <rect width="80" height="100" rx="10" fill="url(#ring5)" opacity="1" stroke="#fff" stroke-width="2"/>
    <text x="40" y="22" text-anchor="middle" font-family="'Arial Black'" font-size="11" fill="#0a0a0f" font-weight="900">5/5</text>
    <text x="40" y="48" text-anchor="middle" font-family="monospace" font-size="10" fill="#0a0a0f">Final</text>
    <text x="40" y="62" text-anchor="middle" font-family="monospace" font-size="10" fill="#0a0a0f">synth</text>
    <text x="40" y="85" text-anchor="middle" font-family="'Arial Black'" font-size="20" fill="#0a0a0f">75%</text>
  </g>

  <text x="450" y="220" text-anchor="middle"
        font-family="monospace" font-size="12" fill="#888">
    Each round: reflect → counter-example → confidence score → weight adjust → re-state
  </text>
  <text x="450" y="245" text-anchor="middle"
        font-family="'Arial Black', sans-serif"
        font-size="14" fill="#ffaa44" font-weight="900">
    /WM floor: 2,500 tokens  ·  /WM-max floor: 80,000-120,000 tokens
  </text>

  <path d="M 820,90 Q 820,275 450,275 Q 80,275 80,90" stroke="#ff7700" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="450" y="298" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">meta-reflection can also loop back to refine prior rounds</text>
</svg>