<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" role="img" aria-label="Token Waster multiplier comparison">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffcc88"/>
      <stop offset="100%" stop-color="#ff7733"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7733"/>
      <stop offset="100%" stop-color="#ff4400"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4400"/>
      <stop offset="100%" stop-color="#cc2200"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cc2200"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#990000"/>
      <stop offset="100%" stop-color="#220000"/>
    </linearGradient>
    <linearGradient id="bar6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#440000"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <rect width="900" height="440" fill="url(#bg)" rx="8"/>

  <text x="450" y="35" text-anchor="middle"
        font-family="'Arial Black', sans-serif"
        font-size="22" font-weight="900" fill="#1a1a1a">
    Token Output Multiplier vs. ~100-token Baseline
  </text>
  <text x="450" y="58" text-anchor="middle"
        font-family="monospace" font-size="12" fill="#666">
    log scale: how many times more tokens one response burns (target: fill the model's output cap)
  </text>

  <line x1="180" y1="85" x2="180" y2="370" stroke="#333" stroke-width="2"/>

  <!-- Log-style scale: 10x, 100x, 1000x, 10000x mapped to log positions -->
  <!-- 7x = 0.85 of 10x line (almost the floor) -->
  <!-- Max width for v3/WM-max = 3200x = log10(3200) / log10(10000) = ~3.5/4 = ~87.5% of max -->
  <!-- Total bar zone width = 640px (x=180 to x=820) -->
  <!-- Use log10: x = 180 + (log10(value) / log10(10000)) * 640 -->
  <!-- 7x: 180 + 0.845/4 * 640 = 180 + 135 = 315 → bar width 135 -->
  <!-- 25x: 180 + 1.398/4 * 640 = 180 + 224 = 404 → bar width 224 -->
  <!-- 60x: 180 + 1.778/4 * 640 = 180 + 284 = 464 → bar width 284 -->
  <!-- 160x: 180 + 2.204/4 * 640 = 180 + 353 = 533 → bar width 353 -->
  <!-- 200x: 180 + 2.301/4 * 640 = 180 + 368 = 548 → bar width 368 -->
  <!-- 3200x: 180 + 3.505/4 * 640 = 180 + 561 = 741 → bar width 561 -->

  <line x1="180" y1="370" x2="820" y2="370" stroke="#333" stroke-width="2"/>
  <text x="825" y="374" font-family="monospace" font-size="11" fill="#666">10,000x</text>

  <!-- Scale ticks at 10x, 100x, 1000x, 10000x -->
  <line x1="340" y1="370" x2="340" y2="80" stroke="#999" stroke-dasharray="2,2" opacity="0.4"/>
  <text x="340" y="78" text-anchor="middle" font-family="monospace" font-size="9" fill="#999">100x</text>
  <line x1="500" y1="370" x2="500" y2="80" stroke="#999" stroke-dasharray="2,2" opacity="0.4"/>
  <text x="500" y="78" text-anchor="middle" font-family="monospace" font-size="9" fill="#999">1,000x</text>

  <text x="260" y="78" text-anchor="middle" font-family="monospace" font-size="9" fill="#999">10x</text>
  <text x="170" y="374" text-anchor="end" font-family="monospace" font-size="10" fill="#666">0</text>

  <!-- v1: 7x → bar width 135 -->
  <g>
    <rect x="180" y="95" width="135" height="32" fill="url(#bar1)" rx="3"/>
    <text x="320" y="116" font-family="monospace" font-size="13" fill="#333" font-weight="bold">v1 · 7x</text>
    <text x="328" y="135" font-family="monospace" font-size="10" fill="#888">1 layer, basic verbosity</text>
  </g>

  <!-- v2: 25x → bar width 224 -->
  <g>
    <rect x="180" y="145" width="224" height="32" fill="url(#bar2)" rx="3"/>
    <text x="410" y="166" font-family="monospace" font-size="13" fill="#333" font-weight="bold">v2 · 25x</text>
    <text x="418" y="185" font-family="monospace" font-size="10" fill="#888">4 layers + 8-check self-verify</text>
  </g>

  <!-- v3 Talkative: 60x → bar width 284 -->
  <g>
    <rect x="180" y="195" width="284" height="32" fill="url(#bar2)" rx="3"/>
    <text x="470" y="216" font-family="monospace" font-size="13" fill="#fff" font-weight="bold">v3 Talkative · 60x</text>
    <text x="478" y="235" font-family="monospace" font-size="10" fill="#444">5 layers, optional Ultra loop</text>
  </g>

  <!-- v3 /WM: 160x → bar width 353 -->
  <g>
    <rect x="180" y="245" width="353" height="32" fill="url(#bar4)" rx="3"/>
    <text x="540" y="266" font-family="monospace" font-size="13" fill="#fff" font-weight="bold">v3 /WM · 160x</text>
    <text x="540" y="285" font-family="monospace" font-size="10" fill="#fff" opacity="0.85">all 5 layers + 6 WM · fills the 16K cap (Claude Code / GPT-4o)</text>
  </g>

  <!-- v3 /WM + Polling: 200x → bar width 368 -->
  <g>
    <rect x="180" y="295" width="368" height="32" fill="url(#bar5)" rx="3"/>
    <text x="555" y="316" font-family="monospace" font-size="14" fill="#fff" font-weight="bold">v3 /WM + Polling · 200x</text>
    <text x="555" y="335" font-family="monospace" font-size="10" fill="#fff" opacity="0.85">max burn on 16K-cap · background polling</text>
  </g>

  <!-- v3 /WM-max: 3,200x → bar width 561 -->
  <g>
    <rect x="180" y="345" width="561" height="32" fill="url(#bar6)" rx="3" stroke="#ff4400" stroke-width="2"/>
    <text x="748" y="366" font-family="monospace" font-size="15" fill="#ffdd00" font-weight="bold">v3 /WM-max · 3,200x 🚀</text>
    <text x="748" y="385" font-family="monospace" font-size="10" fill="#ffaa44" opacity="0.95">all 5 layers × scaled + 6 WM × scaled · fills the 384K cap (DeepSeek V4)</text>
  </g>

  <text x="450" y="425" text-anchor="middle"
        font-family="'Arial Black', sans-serif"
        font-size="14" fill="#cc2200" font-weight="900">
    one heavy /WM-max user ≈ 52,000 normal users per month (~20× a /WM heavy user)
  </text>
</svg>